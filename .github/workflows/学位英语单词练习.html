        let currentIndex = 0;
        let correctCount = 0;
        let totalAnswered = 0;

        const meaningDisplay = document.getElementById('meaningDisplay');
        const wordDisplay = document.getElementById('wordDisplay');
        const wordAndPhonetic = document.getElementById('wordAndPhonetic');
        const wordInput = document.getElementById('wordInput');
        const feedback = document.getElementById('feedback');
        const startBtn = document.getElementById('startBtn');
        const speakBtn = document.getElementById('speakBtn');
        const progressEl = document.getElementById('progress');
        const totalEl = document.getElementById('total');
        const accuracyEl = document.getElementById('accuracy');

        totalEl.textContent = vocabulary.length;


        // 初始化
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            wordInput.disabled = false;
            wordInput.focus();
            loadWord();
            
        });

        // 加载单词
        function loadWord() {
            if (currentIndex >= vocabulary.length) {
                finishPractice();
                return;
            }
            const currentWord = vocabulary[currentIndex];
            meaningDisplay.textContent = currentWord.meaning;
            wordDisplay.textContent = currentWord.word;
            wordAndPhonetic.textContent = ''; // 隐藏英文，等你拼写
            wordInput.value = '';
            feedback.textContent = '';
            progressEl.textContent = currentIndex + 1;
            // speakBtn.disabled = true;
             if (currentIndex < vocabulary.length) {
                speakWord(vocabulary[currentIndex].word);
            }
        }

        // 检查答案
        function checkAnswer() {
            const userInput = wordInput.value.trim().toLowerCase();
            const currentWord = vocabulary[currentIndex];

            if (!userInput) return;

            totalAnswered++;
            if (userInput === currentWord.word.toLowerCase()) {
                feedback.textContent = '✅ 回答正确！';
                feedback.className = 'feedback correct';
                correctCount++;
                wordAndPhonetic.textContent = `${currentWord.word}  ${currentWord.phonetic}`;
                speakBtn.disabled = false;
                speakWord(currentWord.word);
                
                // 延迟1.5秒自动进入下一个单词
                setTimeout(() => {
                    currentIndex++;
                    loadWord();
                }, 3500);
            } else {
                feedback.textContent = `❌ 错误，正确答案是：${currentWord.word}`;
                feedback.className = 'feedback wrong';
                wordAndPhonetic.textContent = `${currentWord.word}  ${currentWord.phonetic}`;
                speakBtn.disabled = false;
                // 错误时暂停久一点，让你看清楚
                setTimeout(() => {
                    currentIndex++;
                    loadWord();
                }, 2500);
            }
            updateStats();
        }

        // 朗读功能
        function speakWord(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                window.speechSynthesis.speak(utterance);
            } else {
                alert("抱歉，您的浏览器不支持语音合成。");
            }
        }

        speakBtn.addEventListener('click', () => {
            if (currentIndex < vocabulary.length) {
                speakWord(vocabulary[currentIndex].word);
            }
        });

        // 监听回车键
        wordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // 更新统计数据
        function updateStats() {
            const accuracy = totalAnswered === 0 ? 0 : Math.round((correctCount / totalAnswered) * 100);
            accuracyEl.textContent = accuracy + '%';
        }

        // 练习结束
        function finishPractice() {
            meaningDisplay.textContent = '🎉 恭喜！所有单词已练习完毕！';
            wordAndPhonetic.textContent = '';
            wordInput.disabled = true;
            speakBtn.disabled = true;
            startBtn.textContent = '重新开始';
            startBtn.style.display = 'inline-block';
            startBtn.onclick = () => {
                currentIndex = 0;
                correctCount = 0;
                totalAnswered = 0;
                updateStats();
                startBtn.style.display = 'none';
                wordInput.disabled = false;
                wordInput.focus();
                loadWord();
            };
        }
